<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador Script Nokia</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        button { padding: 10px 20px; font-size: 16px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Gerador Script Nokia</h1>
    <button onclick="runScript()">Executar Script</button>
    <h2>Saída:</h2>
    <pre id="output"></pre>
    <script>
        function runScript() {
            document.getElementById('output').textContent = 'Executando...';
            fetch('/run-script', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({})
            })
            .then(response => response.json())
            .then(data => {
                let output = '';
                if (data.stdout) output += data.stdout;
                if (data.stderr) output += '\n[ERRO]\n' + data.stderr;
                document.getElementById('output').textContent = output;
            })
            .catch(err => {
                document.getElementById('output').textContent = 'Erro ao executar: ' + err;
            });
        }
    </script>
</body>
</html>
